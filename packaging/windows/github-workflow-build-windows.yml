# Copy this file to .github/workflows/build-windows.yml on GitHub to enable CI builds.
# Builds a portable Windows zip (no installer) — unzip and run chatxz.exe
name: Build Windows Portable

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version label (e.g. 0.3.50). Leave empty to use chatxz/_version.py'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Read app version
        id: appver
        shell: bash
        run: |
          VERSION=$(grep '__version__' chatxz/_version.py | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "name=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Determine release version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            INPUT="${{ github.event.inputs.version }}"
            if [ -n "$INPUT" ]; then
              VERSION="${INPUT#v}"
            else
              VERSION="${{ steps.appver.outputs.name }}"
            fi
            TAG="v${VERSION}"
          fi
          ZIP="chatxz-${VERSION}-windows-portable.zip"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies and build portable zip
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "rns>=1.3.0" "aiohttp>=3.9.0" pyinstaller
          python -m pip install -e .
          if (Test-Path build) { Remove-Item -Recurse -Force build }
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          pyinstaller --noconfirm packaging/windows/chatxz-portable.spec
          Copy-Item packaging/windows/README-PORTABLE.txt dist/chatxz/ -Force
          $zip = "${{ steps.version.outputs.zip }}"
          Compress-Archive -Path dist/chatxz -DestinationPath "dist/$zip" -Force
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: chatxz-${{ steps.version.outputs.version }}-windows-portable
          path: dist/${{ steps.version.outputs.zip }}

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: chatxz v${{ steps.version.outputs.version }}
          body: |
            ## Windows portable (no installer)

            1. Download `${{ steps.version.outputs.zip }}`
            2. Unzip to any folder
            3. Double-click **chatxz.exe**
            4. Browser opens to http://127.0.0.1:8742

            Data is stored in `chatxz-data/` next to the exe. Allow Windows Firewall for private LAN if prompted.

            See `README-PORTABLE.txt` inside the zip for details.
          files: dist/${{ steps.version.outputs.zip }}
          append_body: true
          make_latest: false